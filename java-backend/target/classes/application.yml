server:
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/codekids?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: codekids_user
    password: codekids123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
