apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: applehaoge/codekids-enterprise-million-v2-ai-service:latest  # 使用 Docker Hub 上的镜像路径
        ports:
        - containerPort: 8000
