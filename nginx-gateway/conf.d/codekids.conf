upstream frontend {
    server frontend:3000;
}

upstream java-backend {
    server java-backend:8080;
}

upstream python-backend {
    server python-backend:5000;
}

upstream ai-service {
    server ai-service:8000;
}

server {
    listen 80;
    server_name localhost codekids.local;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    location /api/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://java-backend:8080;
    }

    location /api/ {
        rewrite ^/api(/.*)$ $1 break;  # 去掉 /api 前缀
        proxy_pass http://java-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /py/ {
        proxy_pass http://python-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/ {
        proxy_pass http://ai-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
